name = "contains_predicate"
description = "CONTAINS string substring predicate."
spec_ref = "openCypher 9 §3.6.5 String operators — CONTAINS"

cypher = """
MATCH (n:Person)
WHERE n.name CONTAINS 'ob'
RETURN n.name AS name
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice"  } },
    { id = "b", labels = ["Person"], properties = { name = "Bob"    } },
    { id = "c", labels = ["Person"], properties = { name = "Robert" } },
]
edges = []

[expected]
columns = ["name"]
rows = [["Bob"], ["Robert"]]
order = "bag"
