name = "keys_rel_unwind"
description = "UNWIND keys(r) AS x expands property keys of a relationship as rows."
spec_ref = "openCypher 9 §6.3.2 — keys()"

cypher = """
MATCH ()-[r:KNOWS]-()
UNWIND keys(r) AS k
RETURN DISTINCT k AS key
ORDER BY key
"""

[fixture]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice" } },
    { id = "bob",   labels = ["Person"], properties = { name = "Bob"   } },
]
edges = [
    { id = "e1", from = "alice", to = "bob", rel_type = "KNOWS", properties = { since = 2020, weight = 1 } },
]

[expected]
columns = ["key"]
rows = [["since"], ["weight"]]
order = "ordered"
