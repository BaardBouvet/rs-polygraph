name = "type_function_in_where"
description = "WHERE type(r) = 'LIKES' filters by relationship type string."
spec_ref = "openCypher 9 §3.7 Functions — type() in WHERE filter"

cypher = """
MATCH (a:Person)-[r]->(b:Person)
WHERE type(r) = 'LIKES'
RETURN a.name AS fan, b.name AS liked
ORDER BY fan, liked
"""

[fixture]
nodes = [
    { id = "u1", labels = ["Person"], properties = { name = "Alice" } },
    { id = "u2", labels = ["Person"], properties = { name = "Bob"   } },
    { id = "u3", labels = ["Person"], properties = { name = "Carol" } },
]
edges = [
    { id = "e1", from = "u1", to = "u2", rel_type = "LIKES",  properties = {} },
    { id = "e2", from = "u1", to = "u3", rel_type = "KNOWS",  properties = {} },
    { id = "e3", from = "u2", to = "u3", rel_type = "LIKES",  properties = {} },
]

[expected]
columns = ["fan", "liked"]
rows = [
    ["Alice", "Bob"],
    ["Bob",   "Carol"],
]
order = "ordered"
