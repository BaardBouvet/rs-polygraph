name = "is_null_in_where"
description = "WHERE n.prop IS NULL selects nodes where the property is absent."
spec_ref = "openCypher 9 §6.1.1 NULL — IS NULL predicate"

cypher = """
MATCH (n:Person)
WHERE n.nickname IS NULL
RETURN n.name AS name
ORDER BY name
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice", nickname = "Ali" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob"                     } },
    { id = "c", labels = ["Person"], properties = { name = "Carol"                   } },
]
edges = []

[expected]
columns = ["name"]
rows = [
    ["Bob"],
    ["Carol"],
]
order = "ordered"
