name = "named_path_length"
description = "length(p) on a fixed-hop named path returns the hop count."
spec_ref = "openCypher 9 §6.3.2 — length(path)"

cypher = """
MATCH p = (a:A)-[:REL]->(b:B)
RETURN length(p) AS l
"""

[fixture]
nodes = [
    { id = "a", labels = ["A"], properties = {} },
    { id = "b", labels = ["B"], properties = {} },
]
edges = [
    { id = "e1", from = "a", to = "b", rel_type = "REL", properties = {} },
]

[expected]
columns = ["l"]
rows = [[1]]
order = "bag"
