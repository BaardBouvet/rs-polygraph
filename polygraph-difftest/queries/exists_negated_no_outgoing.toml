name = "exists_negated_no_outgoing"
description = "NOT EXISTS pattern identifies nodes with no outgoing KNOWS edges."
spec_ref = "openCypher 9 §6.3.4 — pattern predicates — NOT EXISTS"

cypher = """
MATCH (n:Person)
WHERE NOT (n)-[:KNOWS]->()
RETURN n.name AS name
ORDER BY name
"""

[fixture]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice" } },
    { id = "bob",   labels = ["Person"], properties = { name = "Bob"   } },
    { id = "carol", labels = ["Person"], properties = { name = "Carol" } },
]
edges = [
    { id = "e1", from = "alice", to = "bob", rel_type = "KNOWS", properties = {} },
]

# Alice has an outgoing KNOWS → excluded
# Bob and Carol have none → included
[expected]
columns = ["name"]
rows = [["Bob"], ["Carol"]]
order = "ordered"
