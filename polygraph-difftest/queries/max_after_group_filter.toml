name = "max_after_group_filter"
description = "MAX per group, filtered to include only groups above a threshold."
spec_ref = "openCypher 9 §3.5.3 WITH — HAVING-equivalent with MAX"

cypher = """
MATCH (n:Score)
WITH n.category AS cat, max(n.val) AS peak
WHERE peak >= 80
RETURN cat, peak
ORDER BY cat
"""

[fixture]
nodes = [
    { id = "a", labels = ["Score"], properties = { category = "A", val = 90 } },
    { id = "b", labels = ["Score"], properties = { category = "A", val = 70 } },
    { id = "c", labels = ["Score"], properties = { category = "B", val = 60 } },
    { id = "d", labels = ["Score"], properties = { category = "C", val = 85 } },
]
edges = []

[expected]
columns = ["cat", "peak"]
rows = [
    ["A", 90],
    ["C", 85],
]
order = "ordered"
