name = "with_count_then_skip_limit"
description = "Aggregation in WITH then SKIP+LIMIT on the aggregated result."
spec_ref = "openCypher 9 §3.5.3 WITH; §7.2 SKIP; §7.3 LIMIT"

cypher = """
MATCH (n:Person)
WITH n.country AS country, count(*) AS cnt
ORDER BY cnt DESC
SKIP 1
LIMIT 2
RETURN country, cnt
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { country = "US" } },
    { id = "b", labels = ["Person"], properties = { country = "US" } },
    { id = "c", labels = ["Person"], properties = { country = "US" } },
    { id = "d", labels = ["Person"], properties = { country = "UK" } },
    { id = "e", labels = ["Person"], properties = { country = "UK" } },
    { id = "f", labels = ["Person"], properties = { country = "FR" } },
]
edges = []

[expected]
columns = ["country", "cnt"]
rows = [
    ["UK", 2],
    ["FR", 1],
]
order = "ordered"
