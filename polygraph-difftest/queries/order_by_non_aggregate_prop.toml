name = "order_by_non_aggregate_prop"
description = "ORDER BY on a property that is not in the RETURN clause — LQA path inserts extra triple for sort key."
spec_ref = "openCypher 9 §7.1 ORDER BY"

cypher = """
MATCH (n:Person)
RETURN n.name AS name
ORDER BY n.age
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice", age = 30 } },
    { id = "b", labels = ["Person"], properties = { name = "Carol", age = 25 } },
    { id = "c", labels = ["Person"], properties = { name = "Bob",   age = 40 } },
]
edges = []

[expected]
columns = ["name"]
rows = [
    ["Carol"],
    ["Alice"],
    ["Bob"],
]
order = "ordered"
