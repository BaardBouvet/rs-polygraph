name = "two_match_clauses"
description = "Two separate MATCH clauses — second MATCH constrains the result set."
spec_ref = "openCypher 9 §3.4.1 MATCH — chaining MATCH clauses"

cypher = """
MATCH (p:Person)
MATCH (p)-[:WORKS_AT]->(c:Company)
RETURN p.name AS person, c.name AS company
ORDER BY p.name
"""

[fixture]
nodes = [
    { id = "alice",   labels = ["Person"],  properties = { name = "Alice" } },
    { id = "bob",     labels = ["Person"],  properties = { name = "Bob"   } },
    { id = "carol",   labels = ["Person"],  properties = { name = "Carol" } },
    { id = "acme",    labels = ["Company"], properties = { name = "Acme"  } },
    { id = "beta",    labels = ["Company"], properties = { name = "Beta"  } },
]
edges = [
    { id = "e1", from = "alice", to = "acme", rel_type = "WORKS_AT" },
    { id = "e2", from = "bob",   to = "beta", rel_type = "WORKS_AT" },
    # Carol has no WORKS_AT relationship — she is filtered out.
]

[expected]
columns = ["person", "company"]
# Carol has no WORKS_AT edge so she is excluded; Alice and Bob remain.
rows = [
    ["Alice", "Acme"],
    ["Bob",   "Beta"],
]
order = "ordered"
