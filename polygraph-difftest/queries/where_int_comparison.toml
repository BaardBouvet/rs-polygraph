name = "where_int_comparison"
description = "MATCH … WHERE on an integer property using >, with bag-equality result."
spec_ref = "openCypher 9 §3.5.4 WHERE; §3.6.2 numeric comparisons"

cypher = """
MATCH (n:Person)
WHERE n.age > 28
RETURN n.name AS name
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice", age = 30 } },
    { id = "b", labels = ["Person"], properties = { name = "Bob",   age = 25 } },
    { id = "c", labels = ["Person"], properties = { name = "Carol", age = 40 } },
]
edges = []

[expected]
columns = ["name"]
rows = [["Alice"], ["Carol"]]
order = "bag"
