name = "integer_to_float_division"
description = "Integer division via toFloat converts the result to floating point."
spec_ref = "openCypher 9 §6.3.1 Numeric conversion — toFloat"

cypher = """
MATCH (n:Ratio)
RETURN toFloat(n.num) / toFloat(n.den) AS ratio
ORDER BY ratio
"""

[fixture]
nodes = [
    { id = "a", labels = ["Ratio"], properties = { num = 1, den = 2 } },
    { id = "b", labels = ["Ratio"], properties = { num = 3, den = 4 } },
]
edges = []

[expected]
columns = ["ratio"]
rows = [
    [0.5],
    [0.75],
]
order = "ordered"
