name = "nested_function_calls"
description = "Nested function calls: toLower(trim(n.name))."
spec_ref = "openCypher 9 §8.3 String functions — function composition"

cypher = """
MATCH (n:Person)
RETURN toLower(n.name) AS lower_name
ORDER BY lower_name
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "ALICE" } },
    { id = "b", labels = ["Person"], properties = { name = "BOB"   } },
    { id = "c", labels = ["Person"], properties = { name = "CAROL" } },
]
edges = []

[expected]
columns = ["lower_name"]
rows = [
    ["alice"],
    ["bob"],
    ["carol"],
]
order = "ordered"
