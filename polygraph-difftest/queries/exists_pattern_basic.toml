name = "exists_pattern_basic"
description = "WHERE EXISTS pattern matches nodes that have at least one outgoing edge."
spec_ref = "openCypher 9 §6.3.4 Pattern predicates — EXISTS"

cypher = """
MATCH (n:Person)
WHERE (n)-[:KNOWS]->()
RETURN n.name AS name
ORDER BY name
"""

[fixture]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice" } },
    { id = "bob",   labels = ["Person"], properties = { name = "Bob"   } },
    { id = "carol", labels = ["Person"], properties = { name = "Carol" } },
]
edges = [
    { id = "e1", from = "alice", to = "bob",   rel_type = "KNOWS", properties = {} },
    { id = "e2", from = "alice", to = "carol", rel_type = "KNOWS", properties = {} },
]

[expected]
columns = ["name"]
rows = [["Alice"]]
order = "bag"
