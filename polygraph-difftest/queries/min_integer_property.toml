name = "min_integer_property"
description = "MIN aggregation returns the smallest integer property value."
spec_ref = "openCypher 9 §3.7.3 min()"

cypher = """
MATCH (n:Person)
RETURN min(n.age) AS youngest
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice", age = 30 } },
    { id = "b", labels = ["Person"], properties = { name = "Bob",   age = 20 } },
    { id = "c", labels = ["Person"], properties = { name = "Carol", age = 25 } },
]
edges = []

[expected]
columns = ["youngest"]
rows = [[20]]
order = "bag"
