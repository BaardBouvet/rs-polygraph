name = "ends_with_predicate"
description = "ENDS WITH string suffix predicate."
spec_ref = "openCypher 9 §3.6.5 String operators — ENDS WITH"

cypher = """
MATCH (n:Person)
WHERE n.name ENDS WITH 'e'
RETURN n.name AS name
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice"  } },
    { id = "b", labels = ["Person"], properties = { name = "Bruce"  } },
    { id = "c", labels = ["Person"], properties = { name = "Carol"  } },
]
edges = []

[expected]
columns = ["name"]
rows = [["Alice"], ["Bruce"]]
order = "bag"
