name = "with_aggregation_then_filter"
description = "WITH GROUP BY then WHERE filter on the aggregated value (HAVING equivalent)."
spec_ref = "openCypher 9 §3.5.3 WITH — grouping; WHERE after aggregation (HAVING pattern)"

cypher = """
MATCH (n:Person)
WITH n.city AS city, count(*) AS cnt
WHERE cnt > 1
RETURN city, cnt
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice", city = "NYC" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob",   city = "NYC" } },
    { id = "c", labels = ["Person"], properties = { name = "Carol", city = "LA"  } },
]
edges = []

[expected]
columns = ["city", "cnt"]
rows = [["NYC", 2]]
order = "bag"
