name = "starts_with_predicate"
description = "STARTS WITH string prefix predicate."
spec_ref = "openCypher 9 §3.6.5 String operators — STARTS WITH"

cypher = """
MATCH (n:Person)
WHERE n.name STARTS WITH 'A'
RETURN n.name AS name
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice"  } },
    { id = "b", labels = ["Person"], properties = { name = "Bob"    } },
    { id = "c", labels = ["Person"], properties = { name = "Andrea" } },
]
edges = []

[expected]
columns = ["name"]
rows = [["Alice"], ["Andrea"]]
order = "bag"
