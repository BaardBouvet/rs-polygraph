name = "unwind_match_combination"
description = "UNWIND feeds values into a subsequent MATCH — tests UNWIND+MATCH join."
spec_ref = "openCypher 9 §3.4.6 UNWIND; interaction with subsequent MATCH"

cypher = """
UNWIND ['Alice', 'Carol'] AS target_name
MATCH (n:Person {name: target_name})
RETURN n.name AS name, n.age AS age
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice", age = 30 } },
    { id = "b", labels = ["Person"], properties = { name = "Bob",   age = 25 } },
    { id = "c", labels = ["Person"], properties = { name = "Carol", age = 40 } },
]
edges = []

[expected]
columns = ["name", "age"]
rows = [
    ["Alice", 30],
    ["Carol", 40],
]
order = "bag"
