name = "count_aggregate"
description = "COUNT(*) aggregation — single-row result with an integer column."
spec_ref = "openCypher 9 §3.5.7 RETURN; §3.7.1 count()"

cypher = """
MATCH (n:Person)
RETURN count(*) AS total
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
    { id = "c", labels = ["Animal"], properties = { name = "Whiskers" } },
]
edges = []

[expected]
columns = ["total"]
rows = [[2]]
order = "bag"
