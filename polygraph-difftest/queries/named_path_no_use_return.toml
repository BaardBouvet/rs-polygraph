name = "named_path_no_use_return"
description = "Named path variable used only for length(), not returned directly."
spec_ref = "openCypher 9 §6.3.2 — length(path)"

cypher = """
MATCH p = (a:Person)-[:KNOWS]->(b:Person)
RETURN a.name AS name, length(p) AS hops
ORDER BY name
"""

[fixture]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice" } },
    { id = "bob",   labels = ["Person"], properties = { name = "Bob"   } },
    { id = "carol", labels = ["Person"], properties = { name = "Carol" } },
]
edges = [
    { id = "e1", from = "alice", to = "bob",   rel_type = "KNOWS", properties = {} },
    { id = "e2", from = "bob",   to = "carol", rel_type = "KNOWS", properties = {} },
]

[expected]
columns = ["name", "hops"]
rows = [
    ["Alice", 1],
    ["Bob",   1],
]
order = "ordered"
