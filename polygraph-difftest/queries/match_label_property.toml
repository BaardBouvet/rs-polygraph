name = "match_label_property"
description = "MATCH on a label and project a single property — the smoke test for the harness."
spec_ref = "openCypher 9 §3.4.1 Node patterns; §3.5.1 RETURN"

cypher = """
MATCH (n:Person)
RETURN n.name AS name
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice", age = 30 } },
    { id = "b", labels = ["Person"], properties = { name = "Bob",   age = 25 } },
    { id = "c", labels = ["Animal"], properties = { name = "Whiskers" } },
]
edges = []

[expected]
columns = ["name"]
rows = [["Alice"], ["Bob"]]
order = "bag"
