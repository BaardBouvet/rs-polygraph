name = "match_relationship_basic"
description = "Two-hop pattern: KNOWS edge between Persons."
spec_ref = "openCypher 9 §3.4.2 Relationship patterns"

cypher = """
MATCH (a:Person)-[:KNOWS]->(b:Person)
RETURN a.name AS knower, b.name AS known
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
    { id = "c", labels = ["Person"], properties = { name = "Carol" } },
]
edges = [
    { id = "e1", from = "a", to = "b", rel_type = "KNOWS" },
    { id = "e2", from = "a", to = "c", rel_type = "KNOWS" },
]

[expected]
columns = ["knower", "known"]
rows = [
    ["Alice", "Bob"],
    ["Alice", "Carol"],
]
order = "bag"
