name = "with_three_steps"
description = "Three chained WITH clauses — each step filters/renames from the previous."
spec_ref = "openCypher 9 §3.5.3 WITH — chaining multiple WITH"

cypher = """
MATCH (n:Person)
WITH n.name AS name, n.age AS age
WHERE age >= 30
WITH name, age * 2 AS double_age
RETURN name, double_age
ORDER BY name
"""

[fixture]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice", age = 25 } },
    { id = "b", labels = ["Person"], properties = { name = "Bob",   age = 35 } },
    { id = "c", labels = ["Person"], properties = { name = "Carol", age = 40 } },
]
edges = []

[expected]
columns = ["name", "double_age"]
rows = [
    ["Bob",   70],
    ["Carol", 80],
]
order = "ordered"
